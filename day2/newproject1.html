<html>
    <head>
        <title>study with aadi</title>
        <style>
            .search-container {

   align-self:center;             
  display: flex;
  max-width: 800px;
  width: 100%;
  border: 2px solid #ccc;
  border-radius: 24px;
  overflow: hidden;
}

.search-container input {
  flex-grow: 1;
  padding: 10px 15px;
  border: none;
  outline: none;
  font-size: 16px;
}

.search-container button {
  background-color: #007bff;
  color: white;
  padding: 10px 20px;
  border: none;
  cursor: pointer;
  font-weight: bold;
}

.search-container button:hover {
  background-color: #0056b3;
}

        </style>
    </head>
    <body>
        
        <form role="search" class="search-container">
  <input type="search" id="site-search" placeholder="Search our site..." required >
  <button type="submit">Search</button>
</form>
    </body>
</html>
